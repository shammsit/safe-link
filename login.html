<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="login.css">

<body>

<!-- ECG HEARTBEAT LOADER -->
<div id="loader">
    <div class="ecg-wrapper">
        <svg viewBox="0 0 500 100" class="ecg-svg">
            <polyline 
                points="0,50 40,50 60,20 80,80 100,50 140,50 160,30 180,70 200,50 500,50"
                class="ecg-path"/>
        </svg>
    </div>

    <audio id="heartbeatSound"
    src="https://assets.mixkit.co/sfx/preview/mixkit-heart-beat-1055.mp3"
    preload="auto"></audio>
</div>

<!-- HEADER -->
<div class="top-nav">
    <div class="nav-left">
        <button class="nav-btn" onclick="toggleSidebar()">☰</button>
        <button class="nav-btn" onclick="goHome()">⌂</button>
    </div>
    <div class="nav-right">
        <button class="nav-btn" onclick="goBack()">🔙</button>
    </div>
</div>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">

    <div class="sidebar-header">
        <div class="sidebar-logo">
            <img src="logo.png">
            <div class="logo-text">
                <h2>SAFE LINK</h2>
                <p>Tech Gen</p>
            </div>
        </div>
        <button class="close-btn" onclick="toggleSidebar()">✖</button>
    </div>

    <div id="userEmailDisplay" class="user-email"></div>

    <button class="side-btn side-btn-login" onclick="goLogin()">🔐 Login / Signup</button>
    <button class="side-btn side-btn-logout" style="display:none;" onclick="logoutUser()">🚪 Logout</button>
    <button class="side-btn" onclick="goHome()">🏠 Home</button>
<button class="side-btn">🚨 Emergency</button>
<button class="side-btn">👤 Profile</button>
<button class="side-btn">⚙ Settings</button>
<button class="side-btn">📢 Notification</button>
<button class="side-btn">🔍 Search</button>
<button class="side-btn">ℹ About</button>
<button class="side-btn">🌐 Change Language</button>
<button class="side-btn">📞 Contact Us</button>
<button class="side-btn">💬 Feedback</button>
<button class="side-btn">📅 Meeting</button>
<button class="side-btn">🆕 What’s New</button>
<button class="side-btn">🚩 Report</button>
<button class="side-btn disabled">💝 Donation (Coming Soon)</button>
</div>

<!-- AUTH CONTAINER -->
<div class="auth-container">
    <div class="auth-box">

        <div class="auth-toggle">
            <button id="loginTab" onclick="showLogin()">Login</button>
            <button id="signupTab" onclick="showSignup()">Signup</button>
        </div>

        <!-- LOGIN BLOCK -->
        <div id="loginBlock">

            <input type="email" id="loginEmail" placeholder="Email">
            <input type="password" id="loginPassword" placeholder="Password">

            <div class="captcha-box">
                <span id="loginCaptchaText"></span>
                <button onclick="generateLoginCaptcha()">↻</button>
            </div>

            <input type="text" id="loginCaptchaInput" placeholder="Enter CAPTCHA">

            <button class="auth-btn" onclick="login()">Login</button>
            <button class="reset-btn" onclick="resetPassword()">Forgot Password?</button>

        </div>

        <!-- SIGNUP BLOCK -->
        <div id="signupBlock" style="display:none;">

            <input type="email" id="signupEmail" placeholder="Email">
            <input type="password" id="signupPassword" placeholder="Password">

            <div class="strength-meter">
                <div id="strengthBar"></div>
            </div>

            <div class="captcha-box">
                <span id="signupCaptchaText"></span>
                <button onclick="generateSignupCaptcha()">↻</button>
            </div>

            <input type="text" id="signupCaptchaInput" placeholder="Enter CAPTCHA">

            <button class="auth-btn" onclick="signup()">Create Account</button>

        </div>

        <p id="authMsg"></p>

    </div>
</div>
