<body>

<!-- ================= LOADER ================= -->
<div id="loader">
    <div class="ecg-wrapper">
        <svg viewBox="0 0 500 100" class="ecg-svg">
            <polyline 
                points="0,50 40,50 60,20 80,80 100,50 140,50 160,30 180,70 200,50 500,50"
                class="ecg-path"/>

    src="https://assets.mixkit.co/sfx/preview/mixkit-heart-beat-1055.mp3"
    preload="auto"></audio>
</div>

<!-- ================= TOP NAV ================= -->
<div class="top-nav">
    <div class="nav-left">
        <button class="nav-btn" onclick="toggleSidebar()">☰</button>
        <button class="nav-btn" onclick="goHome()">⌂</button>
        <button class="nav-btn">🔍</button>
        <button class="nav-btn">⚙</button>
    </div>

    <div class="nav-right">
        <button class="nav-btn">❤️</button>
        <button class="nav-btn" onclick="goAbout()">!</button>
        <button class="nav-btn">📞</button>
        <button class="nav-btn">🔔</button>
        <button class="nav-btn" onclick="goBack()">🔙</button>
    </div>
</div>

<!-- ================= SIDEBAR ================= -->
<div id="sidebar" class="sidebar">
    <div class="sidebar-header">
        <div class="sidebar-logo">
            <img src="logo.png">
            <div class="logo-text">
                <h2>SAFE LINK</h2>
                <p>Tech Gen</p>
            </div>
        </div>
        <button class="close-btn" onclick="toggleSidebar()">✖</button>
    </div>

    <div id="userEmailDisplay" class="user-email"></div>

    <button class="side-btn side-btn-dashboard" style="display:none;" onclick="goDashboard();closeSidebar();">📊 Dashboard</button>
    <button class="side-btn side-btn-login" onclick="goLogin();closeSidebar();">🔐 Login / Signup</button>
    <button class="side-btn side-btn-logout" style="display:none;" onclick="logoutUser();closeSidebar();">🚪 Logout</button>

    <hr style="border:1px solid #222; margin:10px 0;">

    <button class="side-btn" onclick="goHome();closeSidebar();">🏠 Home</button>
</div>

<!-- ================= AUTH ================= -->
<div class="auth-container">
<div class="auth-box">

<div class="auth-logo">
<img src="logo.png">
<h2>SAFE LINK</h2>
<p>Tech Gen</p>
</div>

<div class="auth-toggle">
<button id="loginTab" class="active" onclick="showLogin()">Login</button>
<button id="signupTab" onclick="showSignup()">Signup</button>
<button id="adminTab" onclick="showAdmin()">Admin Corner</button>
</div>

<div id="loginBlock">
<input type="email" id="loginEmail" placeholder="Email Address">
<input type="password" id="loginPassword" placeholder="Password">

<div class="captcha-box">
<span id="loginCaptchaText"></span>
<button onclick="generateLoginCaptcha()">↻</button>
</div>

<input type="text" id="loginCaptchaInput" placeholder="Enter CAPTCHA">

<button class="auth-btn" onclick="login()">Login</button>
</div>

<div id="signupBlock" style="display:none;">
<input type="email" id="signupEmail" placeholder="Email Address">
<input type="password" id="signupPassword" placeholder="Password">

<div class="captcha-box">
<span id="signupCaptchaText"></span>
<button onclick="generateSignupCaptcha()">↻</button>
</div>

<input type="text" id="signupCaptchaInput" placeholder="Enter CAPTCHA">

<button class="auth-btn" onclick="signup()">Create Account</button>
</div>
<div id="adminBlock" style="display:none;">

<input type="text" id="adminUser" placeholder="Admin ID">
<input type="password" id="adminPass" placeholder="Admin Password">

<div class="captcha-box">
<span id="adminCaptchaText"></span>
<button onclick="generateAdminCaptcha()">↻</button>
</div>

<input type="text" id="adminCaptchaInput" placeholder="Enter CAPTCHA">

<button class="admin-btn" onclick="adminLogin()">Enter Admin Panel</button>

</div>
<p id="authMsg"></p>

</div>
</div>
