<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="login.css">

<body>

<!-- ================= LOADER ================= -->
<div id="loader">
    <div class="ecg-wrapper">
        <svg viewBox="0 0 500 100" class="ecg-svg">
            <polyline 
                points="0,50 40,50 60,20 80,80 100,50 140,50 160,30 180,70 200,50 500,50"
                class="ecg-path"/>
        </svg>
    </div>
    <audio id="heartbeatSound"
    src="https://assets.mixkit.co/sfx/preview/mixkit-heart-beat-1055.mp3"
    preload="auto"></audio>
</div>

<!-- ================= TOP NAV ================= -->
<div class="top-nav">
    <div class="nav-left">
        <button class="nav-btn" onclick="toggleSidebar()">☰</button>
        <button class="nav-btn" onclick="goHome()">⌂</button>
        <button class="nav-btn">🔍</button>
        <button class="nav-btn">⚙</button>
    </div>

    <div class="nav-right">
        <button class="nav-btn">❤️</button>
        <button class="nav-btn">⚠</button>
        <button class="nav-btn">📞</button>
        <button class="nav-btn">🔔</button>
        <button class="nav-btn" onclick="goBack()">🔙</button>
    </div>
</div>

<!-- ================= SIDEBAR ================= -->
<div id="sidebar" class="sidebar">

    <div class="sidebar-header">
        <div class="sidebar-logo">
            <img src="logo.png" alt="Safe Link Logo">
            <div class="logo-text">
                <h2>SAFE LINK</h2>
                <p>Tech Gen</p>
            </div>
        </div>
        <button class="close-btn" onclick="toggleSidebar()">✖</button>
    </div>

    <div id="userEmailDisplay" class="user-email"></div>

    <button class="side-btn side-btn-dashboard" style="display:none;" onclick="goDashboard();closeSidebar();">📊 Dashboard</button>
    <button class="side-btn side-btn-login" onclick="goLogin();closeSidebar();">🔐 Login / Signup</button>
    <button class="side-btn side-btn-logout" style="display:none;" onclick="logoutUser();closeSidebar();">🚪 Logout</button>

    <hr style="border:1px solid #222; margin:10px 0;">

    <button class="side-btn" onclick="goHome();closeSidebar();">🏠 Home</button>
    <button class="side-btn">🚨 Emergency without Login</button>
    <button class="side-btn">⚙ Settings</button>
    <button class="side-btn">🔔 Notification</button>
    <button class="side-btn">🔍 Search</button>
    <button class="side-btn">ℹ About</button>
    <button class="side-btn disabled">🌐 Change Language (Coming Soon)</button>
    <button class="side-btn">📞 Contact Us</button>
    <button class="side-btn">💬 Feedback / Suggestion</button>
    <button class="side-btn">📅 Meeting</button>
    <button class="side-btn">📢 Report</button>
    <button id="donationBtn" class="side-btn disabled">💰 Donation</button>

    <div class="sidebar-footer">
        Thank you for using our app ❤️
    </div>

</div>

<!-- ================= AUTH SECTION ================= -->
<div class="auth-container">
    <div class="auth-box">

        <div class="auth-logo">
            <img src="logo.png" alt="Safe Link Logo">
            <h2>SAFE LINK</h2>
            <p>Tech Gen</p>
        </div>

        <div class="auth-toggle">
            <button id="loginTab" onclick="showLogin()">Login</button>
            <button id="signupTab" onclick="showSignup()">Signup</button>
        </div>

        <!-- LOGIN -->
        <div id="loginBlock">

            <input type="email" id="loginEmail" placeholder="Email">
            <input type="password" id="loginPassword" placeholder="Password">

            <div class="captcha-box">
                <span id="loginCaptchaText"></span>
                <button onclick="generateLoginCaptcha()">↻</button>
            </div>

            <input type="text" id="loginCaptchaInput" placeholder="Enter CAPTCHA">

            <button class="auth-btn" onclick="login()">Login</button>
            <button class="reset-btn" onclick="resetPassword()">Forgot Password?</button>

        </div>

        <!-- SIGNUP -->
        <div id="signupBlock" style="display:none;">

            <input type="email" id="signupEmail" placeholder="Email">
            <input type="password" id="signupPassword" placeholder="Password">

            <div class="strength-meter">
                <div id="strengthBar"></div>
            </div>

            <div class="captcha-box">
                <span id="signupCaptchaText"></span>
                <button onclick="generateSignupCaptcha()">↻</button>
            </div>

            <input type="text" id="signupCaptchaInput" placeholder="Enter CAPTCHA">

            <button class="auth-btn" onclick="signup()">Create Account</button>

        </div>

        <p id="authMsg"></p>

        <div style="margin-top:15px; font-size:13px;">
            <span style="cursor:pointer; color:#00bfff;" onclick="toggleMailHelp()">
                Mail not received?
            </span>

            <div id="mailHelpBox" style="display:none; margin-top:10px; color:#ccc;">
                Please check your mail's Spam Section.<br><br>
                <button class="side-btn disabled">Contact Us</button>
            </div>
        </div>

    </div>
</div>
