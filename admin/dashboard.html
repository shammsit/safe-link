<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Admin Dashboard - Safe Link</title>

<link rel="icon" href="../favicon.png">
<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="dashboard.css">

</head>
<body>

<!-- ================= TOP NAV ================= -->
<div class="top-nav">
    <div class="nav-left">
        <button class="nav-btn" onclick="toggleSidebar()">☰</button>
        <button class="nav-btn" onclick="goHome()">⌂</button>
        <button class="nav-btn">🔍</button>
        <button class="nav-btn">⚙</button>
    </div>

    <div class="nav-right">
        <button class="nav-btn">❤️</button>
        <button class="nav-btn" onclick="goAbout()">!</button>
        <button class="nav-btn" onclick="goContact()">📞</button>
        <button class="nav-btn">🔔</button>
        <button class="nav-btn" onclick="goBack()">🔙</button>
    </div>
</div>

<!-- ================= SIDEBAR ================= -->
<div id="sidebar" class="sidebar">

    <div class="sidebar-header">
        <div class="sidebar-logo">
            <img src="../logo.png">
            <div class="logo-text">
                <h2>ADMIN PANEL</h2>
                <p>Safe Link</p>
            </div>
        </div>
        <button class="close-btn" onclick="toggleSidebar()">✖</button>
    </div>

    <div id="adminDisplay" class="user-email"></div>

    <button class="side-btn" onclick="goHome();closeSidebar();">🏠 Home</button>
    <button class="side-btn">🔍 Search</button>
    <button class="side-btn" onclick="goAbout()">ℹ About</button>
    <button class="side-btn" onclick="goContact()">📞 Contact Developer</button>
    <button class="side-btn">💬 Feedback & Suggestions</button>
    <button class="side-btn">📅 Conduct Meeting</button>
    <button class="side-btn">🔔 Give Notification</button>
    <button class="side-btn">📨 User Contact Messages</button>

    <hr style="border:1px solid #222; margin:10px 0;">

    <!-- ✅ LOGOUT -->
    <button class="side-btn" onclick="logoutAdmin()">🚪 Logout</button>

    <!-- ✅ ADMIN FOOTER MESSAGE -->
    <div id="adminFooter" style="
        margin-top:20px;
        padding:12px;
        font-size:12px;
        color:#888;
        text-align:center;
        border-top:1px solid #222;
    ">
    </div>

</div>

<!-- ================= PAGE CONTENT ================= -->
<div class="main">

    <h1>Welcome Admin</h1>

    <div style="
        margin-top:20px;
        padding:20px;
        background:#1a1a1a;
        border-radius:12px;
        display:inline-block;
        min-width:280px;
    ">
        <p id="adminInfo" style="line-height:1.8;"></p>
    </div>

</div>

<!-- ================= SCRIPTS ================= -->
<script src="../options.js"></script>
<script src="dashboard.js"></script>

</body>
</html>
