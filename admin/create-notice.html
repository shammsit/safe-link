<!-- ================= MAIN ================= -->
<div class="main">

    <h1 class="notice-title">New Notice</h1>

    <div class="notice-container">

        <div class="form-group">
            <label>Subject</label>
            <input type="text" placeholder="Enter subject" id="subject">
        </div>

        <div class="form-group">

    <div class="form-group">
    

    <div class="check-group">
        To:
        <label>
            <input type="radio" name="target" value="registered"> Registered Users
        </label>

        <label>
            <input type="radio" name="target" value="everyone"> Everyone
        </label>

        <label>
            <input type="radio" name="target" value="specific"> Specific Users
        </label>

    </div>
</div>

        <div class="form-group" id="userSelectGroup">
            <label>Select Users (Multiple)</label>
            <select id="userSelect" multiple size="5">
                <option>Loading users...</option>
            </select>
        </div>

<div class="form-row">
    <div class="form-group">
        <label>Date (Post)</label>
        <input type="date" id="postDate">
    </div>

    <div class="form-group">
        <label>Date (Expiry)</label>
        <input type="date" id="expiryDate">
    </div>
</div>


        <div class="form-group">
            <label>Notice Content</label>
            <textarea placeholder="Write your notice here..." id="content"></textarea>
        </div>

       <div class="form-row">

    <div class="form-group">
        <label>Attachment</label>
        <input type="file" id="attachment">
        <label>
        <div id="filePreview" style="
        margin-top:10px;">  </div>
        </label>
    </div>
    

    <div class="form-group inline-check">
        <label>
            <input type="checkbox" id="urgentCheck"> Urgent
        </label>
    </div>

    <div class="form-group">
        <label>By</label>
        <input type="text" id="adminRoleField" readonly>
    </div>

</div>
</div>
        <!-- ✅ POST BUTTON -->
        <button class="post-btn" onclick="postNotice()">🚀 Post Notice</button>

    </div>

</div>
<!-- ================= ACTIVE NOTICES ================= -->
<div class="notice-container">

    <h2 style="margin-bottom:15px;">📢 Active Notices</h2>

    <div id="noticeList">
        Loading notices...
    </div>

</div>
