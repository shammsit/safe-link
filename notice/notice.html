<!DOCTYPE html>
<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Notices - Safe Link</title>
<link rel="icon" href="../favicon.png">

<link rel="stylesheet" href="notice.css">

<body>

<!-- ================= LOADER ================= -->
<div id="loader">
    <div class="ecg-wrapper">
        <svg viewBox="0 0 500 100" class="ecg-svg">
            <polyline 
                points="0,50 40,50 60,20 80,80 100,50 140,50 160,30 180,70 200,50 500,50"
                class="ecg-path"/>
        </svg>
    </div>
</div>

<!-- ================= TOP NAV ================= -->
<div class="top-nav">
    <div class="nav-left">
        <button class="nav-btn" onclick="toggleSidebar()">☰</button>
        <button class="nav-btn" onclick="goHome()">⌂</button>
        <button id="headerProfileBtn" class="nav-btn">👤</button>
        <button class="nav-btn">🔍</button>
        <button class="nav-btn">⚙</button>
    </div>

    <div class="nav-right">
        <button class="nav-btn">❤️</button>
        <button class="nav-btn" onclick="goAbout()">!</button>
        <button class="nav-btn" onclick="goContact()">📞</button>
        <button class="nav-btn">🔔</button>
        <button class="nav-btn" onclick="goBack()">🔙</button>
    </div>
</div>

<!-- ================= SIDEBAR ================= -->
<div id="sidebar" class="sidebar">

    <div class="sidebar-header">
        <div class="sidebar-logo">
            <img src="../logo.png" alt="Safe Link Logo">
            <div class="logo-text">
                <h2>SAFE LINK</h2>
                <p>Tech Gen</p>
            </div>
        </div>
        <button class="close-btn" onclick="toggleSidebar()">✖</button>
    </div>

    <div id="userEmailDisplay" class="user-email"></div>

    <button class="side-btn side-btn-dashboard" onclick="goDashboard();closeSidebar();">📊 Dashboard</button>
    <button class="side-btn side-btn-login" onclick="goLogin();closeSidebar();">🔐 Login / Signup</button>
    <button class="side-btn side-btn-logout" style="display:none;" onclick="logoutUser();closeSidebar();">🚪 Logout</button>

    <hr style="border:1px solid #222; margin:10px 0;">

    <button class="side-btn" onclick="goHome();closeSidebar();">🏠 Home</button>
    <button class="side-btn">🚨 Emergency without Login</button>
    <button id="profileBtn" class="side-btn">👤 Profile</button>
    <button class="side-btn">⚙ Settings</button>
    <button class="side-btn">🔔 Notification</button> <button class="side-btn" onclick="goNotices()">🔔 Notices</button>
    <button class="side-btn">🔍 Search</button>
    <button class="side-btn" onclick="goAbout()">ℹ About</button>
    <button class="side-btn disabled">🌐 Change Language (Coming Soon)</button>
    <button class="side-btn" onclick="goContact()">📞 Contact Us</button>
    <button class="side-btn">💬 Feedback / Suggestion</button>
    <button class="side-btn">📅 Meeting</button>
    <button class="side-btn">📢 Report</button>

    <div class="sidebar-footer">
        Thank you for using our app ❤️
    </div>

</div>

<!-- ================= MAIN ================= -->
<div class="main">

    <h2>📢 Notices</h2>

    <div id="noticeContainer">
        Loading notices...
    </div>

</div>

    <div style="margin-top:30px;">
        <button onclick="window.location.href='https://techgen.online'" style="
            padding:12px 25px;
            font-size:16px;
            background:#00bfff;
            color:#000;
            border:none;
            border-radius:8px;
            cursor:pointer;
        ">
            Contact Our Team
        </button>
    </div>

</div>
<!-- ================= LIVE CLOCK ================= -->
<div class="live-clock-box">
    <div id="liveTime">00:00:00</div>
    <div id="liveDate">Loading...</div>
</div>
<!-- ================= FOOTER ================= -->
<footer style="
    margin-top:10px;
    padding:25px 0;
    background:#0d0d0d;
    color:#aaa;
    text-align:center;
    font-size:14px;
    border-top:1px solid #222;
">
    <div>© <span id="year"></span> Safe Link. All Rights Reserved.</div>
    <div>Designed & Developed by Tech Gen</div>
    <div>
        <a href="mailto:contact_us@techgen.online" style="color:#00bfff;">
            contact_us@techgen.online
        </a>
    </div>
</footer>
<!-- ================= FLOATING ACTION ================= -->
<div class="floating-box">

    <!-- SHARE -->
    <button class="float-btn share-btn" onclick="shareSite()">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="18" cy="5" r="3"/>
            <circle cx="6" cy="12" r="3"/>
            <circle cx="18" cy="19" r="3"/>
            <line x1="8.7" y1="10.7" x2="15.3" y2="6.3"/>
            <line x1="8.7" y1="13.3" x2="15.3" y2="17.7"/>
        </svg>
    </button>

    <!-- VISITS -->
    <div class="float-circle" id="visitCount">👁 8</div>

    <!-- DAYS -->

</div>
