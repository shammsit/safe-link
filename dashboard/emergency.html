<script>
let map;
let marker;

window.initMap = function () {

    const defaultLocation = { lat: 22.5726, lng: 88.3639 };

    map = new google.maps.Map(
        document.getElementById("map"),
        {
            zoom: 14,
            center: defaultLocation
        }
    );

    marker = new google.maps.Marker({
        position: defaultLocation,
        map: map,
        icon: "http://maps.google.com/mapfiles/ms/icons/blue-dot.png"
    });

    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(position){
            const userLocation = {
                lat: position.coords.latitude,
                lng: position.coords.longitude
            };

            map.setCenter(userLocation);
            marker.setPosition(userLocation);
        });
    }
};
</script>

<script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAE4YGmA3rvJJ43kUARokA3NPQSVFM3AGE&callback=initMap"></script>

<!-- AUTH CHECK -->
<script>
async function checkUser(){

    const path = window.location.pathname;

    // ❌ DO NOT RUN on public pages
    if(
        path.includes("index.html") ||
        path.includes("login.html") ||
        path.includes("about.html")
    ){
        return;
    }

    const { data: { session } } = await supabaseClient.auth.getSession();

    if(!session){
        window.location.href = "../login.html";
        return;
    }

    const { data: { user } } = await supabaseClient.auth.getUser();

    if(user){
        const el = document.getElementById("userEmailDisplay");
        if(el){
            el.innerText = "Logged in: " + user.email;
        }
    }
}

checkUser();
</script>
